# Copy to kintone-targets.yaml in an article workspace.
# Keep real passwords in .env or system environment variables.

defaultTarget: test-news

environments:
  test:
    label: "Test environment"
    baseUrl: "https://test-example.cybozu.com"
    username: "writer@example.com"
    passwordEnv: "KINTONE_TEST_PASSWORD"

    spaces:
      main:
        label: "Main test Space"
        spaceId: "10"

        threads:
          news:
            alias: "test-news"
            nickname: "Test article thread"
            threadId: "12"
            imageWidth: 600

  env1:
    label: "Environment 1"
    baseUrl: "https://env1-example.cybozu.com"
    username: "writer@example.com"
    passwordEnv: "KINTONE_ENV1_PASSWORD"

    spaces:
      company:
        label: "Head office Space"
        spaceId: "20"

        threads:
          news:
            alias: "company-news"
            nickname: "Head office article thread"
            threadId: "34"
            imageWidth: 600

          notice:
            alias: "company-notice"
            nickname: "Head office notice thread"
            threadId: "35"
            imageWidth: 600

  env2:
    label: "Environment 2"
    baseUrl: "https://env2-example.cybozu.com"
    username: "writer@example.com"
    passwordEnv: "KINTONE_ENV2_PASSWORD"

    spaces:
      branch:
        label: "Branch office Space"
        spaceId: "30"

        threads:
          news:
            alias: "branch-news"
            nickname: "Branch office article thread"
            threadId: "56"
            imageWidth: 600
